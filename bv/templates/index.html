<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ГОК "Томинский" — Видео анализ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #5c4b3b, #c19a6b, #3e3a36);
    min-height: 100vh;
    color: #f5f5f5;
}

.topbar {
    height: 70px;
    background: #1f1b18;
    display: flex;
    align-items: center;
    padding: 0 40px;
    border-bottom: 2px solid #c19a6b;
}

.topbar span {
    font-size: 20px;
    font-weight: 600;
    color: #e0c097;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 70px);
}

.container {
    width: 500px;
    padding: 60px;
    background: rgba(40, 35, 30, 0.95);
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

h1 {
    font-size: 24px;
    margin-bottom: 60px;
    color: #e0c097;
}

.upload-area {
    border: 2px dashed #c19a6b;
    padding: 40px 20px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(255,255,255,0.05);
}

.upload-area:hover {
    background: rgba(193,154,107,0.15);
}

input[type="file"] {
    display: none;
}

button {
    margin-top: 60px;
    padding: 15px 30px;
    border: none;
    border-radius: 12px;
    background: #c19a6b;
    color: #2b2b2b;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e0c097;
    transform: scale(1.05);
}

.loader {
    margin-top: 30px;
    display: none;
    font-size: 16px;
    color: #e0c097;
}

.video-result {
    margin-top: 30px;
}

video {
    width: 100%;
    border-radius: 15px;
    border: 1px solid #c19a6b;
}
</style>
</head>

<body>

<div class="topbar">
    <span>ГОК "Томинский"</span>
</div>

<div class="wrapper">
<div class="container">

    <h1>Система обработки видео</h1>

    <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

        <label class="upload-area">
            Выберите видео для анализа
            <input type="file" name="video" required>
        </label>

        <button type="submit">Запустить обработку</button>

        <div class="loader" id="loader">
            ⏳ Видео обрабатывается... Пожалуйста подождите
        </div>

    </form>

    {% if video_file %}
    <div class="video-result">
        <h3>Обработка завершена</h3>
        <video controls>
            <source src="{{ url_for('static', filename=video_file) }}" type="video/mp4">
        </video>
    </div>
    {% endif %}

</div>
</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
