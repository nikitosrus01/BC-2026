<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ГОК "Томинский" — Видео анализ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #5c4b3b, #c19a6b, #3e3a36);
    min-height: 100vh;
    color: #f5f5f5;
}

/* ====== ВЕРХНЯЯ ПАНЕЛЬ ====== */
.topbar {
    height: 70px;
    background: #1f1b18;
    display: flex;
    align-items: center;
    padding: 0 40px;
    border-bottom: 2px solid #c19a6b;
}

.topbar img {
    height: 90px;
    margin-right: 15px;
}

.topbar span {
    font-size: 18px;
    font-weight: 600;
    color: #e0c097;
}

/* ====== ЦЕНТРАЛЬНЫЙ БЛОК ====== */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 70px);
}

.container {
    width: 500px;
    padding: 40px;
    background: rgba(40, 35, 30, 0.95);
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

/* ====== ЗАГОЛОВОК ====== */
h1 {
    font-size: 24px;
    margin-bottom: 50px;
    color: #e0c097;
    line-height: 1.4;
    word-wrap: break-word;
}

/* ====== ЗАГРУЗКА ====== */
.upload-area {
    border: 2px dashed #c19a6b;
    padding: 40px 20px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(255,255,255,0.05);
}

.upload-area:hover {
    background: rgba(193,154,107,0.15);
}

input[type="file"] {
    display: none;
}

.status {
    margin-top: 12px;
    font-size: 14px;
    color: #9be79b;
    display: none;
}

/* ====== КНОПКА ====== */
button {
    margin-top: 50px;
    padding: 15px 30px;
    border: none;
    border-radius: 12px;
    background: #c19a6b;
    color: #2b2b2b;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e0c097;
    transform: scale(1.05);
}

/* ====== ПРОГРЕСС ====== */
.progress-container {
    margin-top: 30px;
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
    display: none;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #e0c097;
    transition: width 0.3s;
}

/* ====== ВИДЕО ====== */
.video-result {
    margin-top: 20px;
    display: none;
}

video {
    width: 89%;
    border-radius: 15px;
    border: 1px solid #c19a6b;
}
</style>
</head>

<body>

<!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
<div class="topbar">
    <img src="/home/nikita/bv/templates/img/gok.png" alt="Логотип">
    <span>ГОК "Томинский"</span>
</div>

<div class="wrapper">
    <div class="container">

        <h1>Система обработки видео</h1>

        <label class="upload-area">
            Выберите видео для анализа
            <input type="file" id="videoInput" accept="video/*">
        </label>

        <div class="status" id="uploadStatus">✅ Файл загружен</div>

        <button id="processBtn" onclick="startProcessing()">Запустить обработку</button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="video-result" id="videoResult">
            <h3>Обработка завершена</h3>
            <video id="outputVideo" controls></video>
        </div>

    </div>
</div>

<script>
let selectedFile;

document.getElementById('videoInput').addEventListener('change', function(e) {
    selectedFile = e.target.files[0];

    if (selectedFile) {
        document.getElementById('uploadStatus').style.display = "block";
    }
});

function startProcessing() {
    if (!selectedFile) {
        alert("Сначала загрузите видео!");
        return;
    }

    const processBtn = document.getElementById('processBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const videoResult = document.getElementById('videoResult');
    const outputVideo = document.getElementById('outputVideo');

    processBtn.style.display = "none";

    progressContainer.style.display = "block";
    videoResult.style.display = "none";
    progressBar.style.width = "0%";

    let progress = 0;

    const interval = setInterval(() => {
        progress += Math.random() * 10;

        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);

            setTimeout(() => {
                progressContainer.style.display = "none";
                videoResult.style.display = "block";
                const videoURL = URL.createObjectURL(selectedFile);
                outputVideo.src = videoURL;
            }, 500);
        }

        progressBar.style.width = progress + "%";
    }, 300);
}
</script>

</body>
</html>
